# Reusable workflow: Full CI/CD pipeline for a Python PyPI package.
# Callers: uses: steamwiz/actions/.github/workflows/python-pipeline.yml@v1
#
# Each job installs Poetry and dependencies independently, using the Poetry
# virtualenvs cache (~/.cache/pypoetry/virtualenvs) to avoid redundant
# network downloads across jobs on the same runner.
#
# See SPEC.md §4 for full documentation.

name: Python Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version passed to actions/setup-python"
        type: string
        default: '3.13'
      source-dir:
        description: >
          Python source package directory for coverage and pycodestyle.
          Defaults to the repo name with hyphens replaced by underscores.
          Set explicitly when the project deviates from that convention.
        type: string
        default: ''
      coverage-min:
        description: "Minimum coverage percentage; job fails if below this"
        type: number
        default: 80
      style-dirs:
        description: >
          Space-separated list of directories (beyond source-dir) to include
          in pycodestyle. Defaults to 'test'.
        type: string
        default: 'test'
      do-pytest:
        description: "Set to false to skip pytest and coverage jobs"
        type: boolean
        default: true
      do-coverage:
        description: "Set to false to skip the coverage check (pytest still runs)"
        type: boolean
        default: true
      do-style:
        description: "Set to false to skip pycodestyle"
        type: boolean
        default: true
      do-release:
        description: "Set to false to skip the release job entirely"
        type: boolean
        default: true
      release-level:
        description: >
          If set to patch, minor, or major, forces python-semantic-release to
          release at that level regardless of commit messages. Empty string means
          normal conventional-commit-driven release.
        type: string
        default: ''

    secrets:
      APP_ID:
        description: >
          GitHub App ID for steamwiz-releasebot. Used to generate a short-lived
          installation token for python-semantic-release.
        required: false
      APP_PRIVATE_KEY:
        description: >
          GitHub App private key (PEM) for steamwiz-releasebot.
        required: false

    outputs:
      version:
        description: "The version string released (e.g. 1.4.2), or empty if no release"
        value: ${{ jobs.release.outputs.version }}
      released:
        description: "'true' if a new version was released, 'false' otherwise"
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: "The git tag created (e.g. v1.4.2), or empty if no release"
        value: ${{ jobs.release.outputs.tag }}

# Prevent overlapping release jobs on rapid pushes to main.
concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-python-pipeline
  cancel-in-progress: true

# Deny all permissions by default; jobs grant only what they need.
permissions: {}

jobs:

  # ---------------------------------------------------------------------------
  # pytest: Install dependencies and run the test suite with coverage.
  # ---------------------------------------------------------------------------
  pytest:
    name: Test
    if: inputs.do-pytest == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Poetry
        run: pip install "poetry==2.*"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ inputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install project dependencies
        run: poetry install --no-root

      - name: Resolve source directory
        run: |
          if [ -n "${{ inputs.source-dir }}" ]; then
            echo "SOURCE_DIR=${{ inputs.source-dir }}" >> "$GITHUB_ENV"
          else
            SOURCE_DIR=$(echo "${{ github.event.repository.name }}" | tr '-' '_')
            echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"
          fi

      - name: Run pytest with coverage
        run: >
          poetry run python -m coverage run
          --source=$SOURCE_DIR
          -m pytest test/ -s
          --junitxml=junit/test-results.xml

      - name: Rename coverage file for upload
        if: always()
        run: mv .coverage coverage.db

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.db
          retention-days: 7

      - name: Upload JUnit results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit
          path: junit/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3   # v2.24.0
        with:
          files: junit/test-results.xml

  # ---------------------------------------------------------------------------
  # coverage: Download the .coverage artifact and enforce the minimum threshold.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    needs: pytest
    if: inputs.do-pytest == true && inputs.do-coverage == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install coverage
        run: pip install coverage

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Generate XML report
        run: python -m coverage xml --data-file=coverage.db

      - name: Enforce coverage threshold
        run: python -m coverage report -m --data-file=coverage.db --fail-under ${{ inputs.coverage-min }}

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Post coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

  # ---------------------------------------------------------------------------
  # style: Run pycodestyle over source-dir and any extra style-dirs.
  # ---------------------------------------------------------------------------
  style:
    name: Style
    if: inputs.do-style == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Poetry
        run: pip install "poetry==2.*"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ inputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install project dependencies
        run: poetry install --no-root

      - name: Resolve source directory
        run: |
          if [ -n "${{ inputs.source-dir }}" ]; then
            echo "SOURCE_DIR=${{ inputs.source-dir }}" >> "$GITHUB_ENV"
          else
            SOURCE_DIR=$(echo "${{ github.event.repository.name }}" | tr '-' '_')
            echo "SOURCE_DIR=$SOURCE_DIR" >> "$GITHUB_ENV"
          fi

      - name: Check style (source dir)
        run: poetry run pycodestyle "$SOURCE_DIR"

      - name: Check style (extra dirs)
        run: |
          for dir in ${{ inputs.style-dirs }}; do
            if [ -d "$dir" ]; then
              poetry run pycodestyle "$dir"
            fi
          done

  # ---------------------------------------------------------------------------
  # release: Bump version, tag, push, create GitHub Release via PSR.
  # Runs only on main, only when do-release is true, only when upstream jobs
  # passed or were intentionally skipped.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [coverage, style]
    if: >
      github.ref == 'refs/heads/main' &&
      inputs.do-release == true &&
      !cancelled() &&
      !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.set-outputs.outputs.version }}
      released: ${{ steps.set-outputs.outputs.released }}
      tag: ${{ steps.set-outputs.outputs.tag }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install python-semantic-release
        run: pip install "python-semantic-release==10.*"

      - name: Configure git user
        run: |
          git config user.name "steamwiz-releasebot[bot]"
          git config user.email "steamwiz-releasebot[bot]@users.noreply.github.com"

      - name: Run semantic-release
        id: psr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FORCE_FLAG=""
          if [ -n "${{ inputs.release-level }}" ]; then
            FORCE_FLAG="--${{ inputs.release-level }}"
          fi
          # PSR v10 writes released=false at init then released=true after tagging,
          # both into $GITHUB_OUTPUT. GitHub Actions uses the FIRST value for
          # duplicate keys, so released stays 'false'. Work around this by having
          # PSR write to a sidecar file, then extracting the last (authoritative)
          # value of each key and writing it to GITHUB_ENV for the next step.
          SIDECAR=$(mktemp)
          GITHUB_OUTPUT="$SIDECAR" semantic-release version $FORCE_FLAG
          echo "--- PSR sidecar (raw) ---"
          grep -E "^(released|version|tag)=" "$SIDECAR" || echo "(none)"
          PSR_RELEASED=$(grep "^released=" "$SIDECAR" | tail -1 | cut -d= -f2)
          PSR_VERSION=$(grep  "^version="  "$SIDECAR" | tail -1 | cut -d= -f2)
          PSR_TAG=$(grep      "^tag="      "$SIDECAR" | tail -1 | cut -d= -f2)
          PSR_RELEASED=${PSR_RELEASED:-false}
          echo "PSR_RELEASED=$PSR_RELEASED" >> "$GITHUB_ENV"
          echo "PSR_VERSION=$PSR_VERSION"   >> "$GITHUB_ENV"
          echo "PSR_TAG=$PSR_TAG"           >> "$GITHUB_ENV"
          echo "Extracted: released=$PSR_RELEASED  version=$PSR_VERSION  tag=$PSR_TAG"
          rm -f "$SIDECAR"

      - name: Set job outputs
        id: set-outputs
        run: |
          echo "released=$PSR_RELEASED" >> "$GITHUB_OUTPUT"
          echo "version=$PSR_VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$PSR_TAG"           >> "$GITHUB_OUTPUT"
          echo "Outputs set: released=$PSR_RELEASED  version=$PSR_VERSION  tag=$PSR_TAG"

  # NOTE: The build job (poetry build + upload dist artifact) is intentionally
  # NOT included in this reusable workflow. GitHub Actions if: conditions on jobs
  # inside a called reusable workflow cannot reliably evaluate outputs from other
  # jobs in that same workflow when those outputs come from run: steps.
  # The build job must live in the caller's workflow, where it can use
  # needs.<pipeline-job>.outputs.released and needs.<pipeline-job>.outputs.tag
  # directly. See steamwiz/actions SPEC.md §4.7 build job specification.
